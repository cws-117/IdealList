<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이상형 리스트</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFF9F4;
    --surface: #FFFFFF;
    --accent: #E8614A;
    --accent2: #F4A261;
    --text: #1A1A1A;
    --text-muted: #999;
    --border: #F0E8E0;
    --tag-bg: #FFF0EB;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 100px;
  }
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 20px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-title { font-family: 'Gowun Batang', serif; font-size: 22px; font-weight: 700; }
  .header-title span { color: var(--accent); }
  .header-sub { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
  .share-btn {
    position: fixed; top: 18px; right: 20px;
    background: var(--accent); color: white; border: none;
    border-radius: 20px; padding: 8px 16px; font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif; font-weight: 500;
    cursor: pointer; z-index: 200; transition: all 0.2s;
  }
  .share-btn:hover { background: #D4503A; transform: scale(1.04); }
  .tabs {
    display: flex; gap: 8px; padding: 16px 20px 0;
    overflow-x: auto; scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 20px; padding: 7px 16px; font-size: 13px;
    font-weight: 500; cursor: pointer; white-space: nowrap;
    transition: all 0.2s; color: var(--text-muted);
  }
  .tab.active { background: var(--accent); border-color: var(--accent); color: white; }
  .content { padding: 20px; }
  .category-section { display: none; }
  .category-section.active { display: block; animation: fadeIn 0.25s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .section-label {
    font-family: 'Gowun Batang', serif; font-size: 18px; font-weight: 700;
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
  }
  .item-card {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 14px; padding: 14px 16px; margin-bottom: 10px;
    display: flex; align-items: flex-start; gap: 12px; transition: all 0.2s;
  }
  .item-card:hover { border-color: var(--accent2); box-shadow: 0 2px 12px rgba(232,97,74,0.08); }
  .item-icon {
    width: 36px; height: 36px; background: var(--tag-bg);
    border-radius: 10px; display: flex; align-items: center;
    justify-content: center; font-size: 18px; flex-shrink: 0;
  }
  .item-body { flex: 1; }
  .item-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .item-desc { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
  .item-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .icon-btn {
    width: 30px; height: 30px; border-radius: 8px; border: none;
    background: var(--bg); cursor: pointer; display: flex;
    align-items: center; justify-content: center; font-size: 14px;
    transition: all 0.15s; color: var(--text-muted);
  }
  .icon-btn:hover { background: var(--border); }
  .icon-btn.delete:hover { background: #FFE8E4; color: var(--accent); }
  .add-btn {
    width: 100%; background: var(--tag-bg); border: 1.5px dashed var(--accent2);
    border-radius: 14px; padding: 14px; font-size: 14px; color: var(--accent);
    font-family: 'Noto Sans KR', sans-serif; font-weight: 500;
    cursor: pointer; transition: all 0.2s; margin-top: 4px;
  }
  .add-btn:hover { background: #FFE8E0; border-color: var(--accent); }

  /* 분석 버튼 바 */
  .analyze-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 14px 20px; z-index: 100;
  }
  .analyze-btn {
    width: 100%;
    background: linear-gradient(135deg, #E8614A, #F4A261);
    color: white; border: none; border-radius: 14px; padding: 15px;
    font-size: 15px; font-family: 'Noto Sans KR', sans-serif; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .analyze-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .analyze-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  /* 모달 공통 */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); z-index: 500;
    align-items: flex-end; backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border-radius: 24px 24px 0 0;
    padding: 28px 24px 40px; width: 100%;
    max-height: 88vh; overflow-y: auto;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-title { font-family: 'Gowun Batang', serif; font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .modal-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }

  /* 분석 결과 */
  .result-section {
    background: var(--bg); border-radius: 16px; padding: 18px; margin-bottom: 14px;
  }
  .result-section-title {
    font-size: 13px; font-weight: 700; color: var(--accent);
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
  }
  .result-text { font-size: 14px; line-height: 1.8; color: var(--text); white-space: pre-wrap; }

  /* 로딩 */
  .loading-wrap { text-align: center; padding: 40px 0; }
  .loading-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 16px; }
  .dot {
    width: 10px; height: 10px; background: var(--accent);
    border-radius: 50%; animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform:translateY(0); } 30% { transform:translateY(-10px); } }
  .loading-text { font-size: 14px; color: var(--text-muted); line-height: 1.8; }

  /* 장소/키워드 태그 */
  .place-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
  .place-tag {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 20px; padding: 6px 14px; font-size: 13px; font-weight: 500;
  }

  /* 폼 */
  .form-group { margin-bottom: 16px; }
  .form-label {
    font-size: 12px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-bottom: 6px; display: block;
  }
  .form-input, .form-textarea {
    width: 100%; background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 11px 14px; font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif; color: var(--text);
    outline: none; transition: border-color 0.2s;
  }
  .form-input:focus, .form-textarea:focus { border-color: var(--accent); }
  .form-textarea { resize: none; height: 80px; }
  .emoji-picker { display: flex; gap: 8px; flex-wrap: wrap; }
  .emoji-option {
    width: 38px; height: 38px; background: var(--bg);
    border: 1.5px solid var(--border); border-radius: 10px;
    font-size: 18px; cursor: pointer; display: flex;
    align-items: center; justify-content: center; transition: all 0.15s;
  }
  .emoji-option.selected, .emoji-option:hover { border-color: var(--accent); background: var(--tag-bg); }
  .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
  .btn-cancel {
    flex: 1; padding: 13px; background: var(--bg);
    border: 1.5px solid var(--border); border-radius: 12px;
    font-size: 14px; font-family: 'Noto Sans KR', sans-serif;
    font-weight: 500; cursor: pointer; color: var(--text-muted);
  }
  .btn-save {
    flex: 2; padding: 13px; background: var(--accent); border: none;
    border-radius: 12px; font-size: 14px; font-family: 'Noto Sans KR', sans-serif;
    font-weight: 700; cursor: pointer; color: white;
  }
  .share-options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 8px; }
  .share-option {
    background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 14px; padding: 20px 16px; text-align: center;
    cursor: pointer; transition: all 0.2s;
  }
  .share-option:hover { border-color: var(--accent); background: var(--tag-bg); }
  .share-option-icon { font-size: 28px; margin-bottom: 8px; }
  .share-option-label { font-size: 13px; font-weight: 600; }
  .share-option-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .toast {
    position: fixed; bottom: 90px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1A1A1A; color: white; padding: 10px 20px;
    border-radius: 20px; font-size: 13px; font-weight: 500;
    opacity: 0; transition: all 0.3s; z-index: 999; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .empty { text-align: center; padding: 40px 0; color: var(--text-muted); }
  .empty-icon { font-size: 40px; margin-bottom: 10px; }
  .empty-text { font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">나의 <span>이상형</span> 리스트 💕</div>
  <div class="header-sub">솔직하게 적어보는 내 이상형</div>
</div>

<button class="share-btn" onclick="openShareModal()">🔗 공유</button>

<div class="tabs">
  <div class="tab active" onclick="switchTab('looks',this)">👀 외모</div>
  <div class="tab" onclick="switchTab('personality',this)">💬 성격</div>
  <div class="tab" onclick="switchTab('values',this)">🌿 가치관</div>
  <div class="tab" onclick="switchTab('lifestyle',this)">☕ 라이프스타일</div>
</div>

<div class="content">
  <div class="category-section active" id="cat-looks">
    <div class="section-label">👀 외모</div>
    <div id="list-looks"></div>
    <button class="add-btn" onclick="openAddModal('looks')">+ 항목 추가</button>
  </div>
  <div class="category-section" id="cat-personality">
    <div class="section-label">💬 성격</div>
    <div id="list-personality"></div>
    <button class="add-btn" onclick="openAddModal('personality')">+ 항목 추가</button>
  </div>
  <div class="category-section" id="cat-values">
    <div class="section-label">🌿 가치관</div>
    <div id="list-values"></div>
    <button class="add-btn" onclick="openAddModal('values')">+ 항목 추가</button>
  </div>
  <div class="category-section" id="cat-lifestyle">
    <div class="section-label">☕ 라이프스타일</div>
    <div id="list-lifestyle"></div>
    <button class="add-btn" onclick="openAddModal('lifestyle')">+ 항목 추가</button>
  </div>
</div>

<!-- 분석 버튼 -->
<div class="analyze-bar">
  <button class="analyze-btn" id="analyzeBtn" onclick="analyzeIdealType()">
    ✨ 내 이상형 AI 분석하기
  </button>
</div>

<!-- 항목 추가/수정 모달 -->
<div class="modal-overlay" id="addModal" onclick="closeModalOnOverlay(event,'addModal')">
  <div class="modal">
    <div class="modal-title" id="modalTitle">항목 추가</div>
    <div class="form-group">
      <label class="form-label">아이콘</label>
      <div class="emoji-picker" id="emojiPicker"></div>
    </div>
    <div class="form-group">
      <label class="form-label">항목 이름</label>
      <input class="form-input" id="itemTitle" placeholder="예: 키가 나보다 클 것" maxlength="30">
    </div>
    <div class="form-group">
      <label class="form-label">설명 (선택)</label>
      <textarea class="form-textarea" id="itemDesc" placeholder="좀 더 구체적으로 적어보세요"></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('addModal')">취소</button>
      <button class="btn-save" onclick="saveItem()">저장</button>
    </div>
  </div>
</div>

<!-- 공유 모달 -->
<div class="modal-overlay" id="shareModal" onclick="closeModalOnOverlay(event,'shareModal')">
  <div class="modal">
    <div class="modal-title">공유하기 💕</div>
    <div class="share-options">
      <div class="share-option" onclick="shareLink()">
        <div class="share-option-icon">🔗</div>
        <div class="share-option-label">링크 복사</div>
        <div class="share-option-sub">클립보드에 복사</div>
      </div>
      <div class="share-option" onclick="shareImage()">
        <div class="share-option-icon">🖼️</div>
        <div class="share-option-label">이미지 저장</div>
        <div class="share-option-sub">캡처 후 저장</div>
      </div>
    </div>
    <div class="modal-btns" style="margin-top:16px">
      <button class="btn-cancel" onclick="closeModal('shareModal')" style="flex:1">닫기</button>
    </div>
  </div>
</div>

<!-- AI 분석 결과 모달 -->
<div class="modal-overlay" id="resultModal" onclick="closeModalOnOverlay(event,'resultModal')">
  <div class="modal">
    <div class="modal-title">✨ 이상형 분석 결과</div>
    <div class="modal-sub">AI가 분석한 나의 이상형</div>
    <div id="resultContent"></div>
    <div class="modal-btns" style="margin-top:8px">
      <button class="btn-cancel" onclick="closeModal('resultModal')" style="flex:1">닫기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const EMOJIS = ['💕','✨','🌟','💫','🔥','🌙','🌸','🎯','💎','🍀','🌊','⚡','🦋','🎵','🌈','👑'];
  const CAT_LABELS = { looks:'외모', personality:'성격', values:'가치관', lifestyle:'라이프스타일' };

  let data = {
    looks: [
      { id:1, icon:'✨', title:'청결하고 단정한 외모', desc:'옷차림이나 헤어가 깔끔한 사람' },
      { id:2, icon:'💪', title:'건강한 체형', desc:'운동을 꾸준히 하는 느낌' },
    ],
    personality: [
      { id:3, icon:'😊', title:'밝고 긍정적인 성격', desc:'함께 있으면 기분이 좋아지는 사람' },
      { id:4, icon:'🎯', title:'자기 주관이 뚜렷한 사람', desc:'우유부단하지 않고 결정력 있는' },
    ],
    values: [
      { id:5, icon:'🌿', title:'가족을 소중히 여기는 사람', desc:'' },
    ],
    lifestyle: [
      { id:6, icon:'☕', title:'취미가 있는 사람', desc:'자기만의 시간을 알차게 보내는' },
    ]
  };

  let currentCat = 'looks', editingId = null, selectedEmoji = '💕';

  function renderAll() { Object.keys(data).forEach(c => renderList(c)); }

  function renderList(cat) {
    const el = document.getElementById('list-' + cat);
    const items = data[cat];
    if (!items.length) {
      el.innerHTML = `<div class="empty"><div class="empty-icon">💭</div><div class="empty-text">아직 항목이 없어요.<br>추가해보세요!</div></div>`;
      return;
    }
    el.innerHTML = items.map(item => `
      <div class="item-card">
        <div class="item-icon">${item.icon}</div>
        <div class="item-body">
          <div class="item-title">${item.title}</div>
          ${item.desc ? `<div class="item-desc">${item.desc}</div>` : ''}
        </div>
        <div class="item-actions">
          <button class="icon-btn" onclick="openEditModal('${cat}',${item.id})">✏️</button>
          <button class="icon-btn delete" onclick="deleteItem('${cat}',${item.id})">🗑️</button>
        </div>
      </div>
    `).join('');
  }

  function switchTab(cat, el) {
    currentCat = cat;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.querySelectorAll('.category-section').forEach(s => s.classList.remove('active'));
    document.getElementById('cat-' + cat).classList.add('active');
  }

  function buildEmojiPicker() {
    document.getElementById('emojiPicker').innerHTML = EMOJIS.map(e =>
      `<div class="emoji-option ${e===selectedEmoji?'selected':''}" onclick="selectEmoji('${e}',this)">${e}</div>`
    ).join('');
  }

  function selectEmoji(e, el) {
    selectedEmoji = e;
    document.querySelectorAll('.emoji-option').forEach(x => x.classList.remove('selected'));
    el.classList.add('selected');
  }

  function openAddModal(cat) {
    currentCat = cat; editingId = null; selectedEmoji = '💕';
    document.getElementById('modalTitle').textContent = '항목 추가';
    document.getElementById('itemTitle').value = '';
    document.getElementById('itemDesc').value = '';
    buildEmojiPicker();
    document.getElementById('addModal').classList.add('open');
  }

  function openEditModal(cat, id) {
    currentCat = cat; editingId = id;
    const item = data[cat].find(i => i.id === id);
    selectedEmoji = item.icon;
    document.getElementById('modalTitle').textContent = '항목 수정';
    document.getElementById('itemTitle').value = item.title;
    document.getElementById('itemDesc').value = item.desc;
    buildEmojiPicker();
    document.getElementById('addModal').classList.add('open');
  }

  function saveItem() {
    const title = document.getElementById('itemTitle').value.trim();
    if (!title) { showToast('항목 이름을 입력해주세요 😅'); return; }
    const desc = document.getElementById('itemDesc').value.trim();
    if (editingId !== null) {
      const item = data[currentCat].find(i => i.id === editingId);
      Object.assign(item, { icon: selectedEmoji, title, desc });
      showToast('수정됐어요 ✅');
    } else {
      data[currentCat].push({ id: Date.now(), icon: selectedEmoji, title, desc });
      showToast('추가됐어요 💕');
    }
    renderList(currentCat);
    closeModal('addModal');
  }

  function deleteItem(cat, id) {
    data[cat] = data[cat].filter(i => i.id !== id);
    renderList(cat);
    showToast('삭제됐어요 🗑️');
  }

  // ---- AI 분석 ----
  async function analyzeIdealType() {
    const totalItems = Object.values(data).flat();
    if (totalItems.length < 2) { showToast('이상형 항목을 더 추가해주세요 😊'); return; }

    const btn = document.getElementById('analyzeBtn');
    btn.disabled = true;
    btn.textContent = '분석 중...';

    document.getElementById('resultContent').innerHTML = `
      <div class="loading-wrap">
        <div class="loading-dots">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <div class="loading-text">이상형 항목을 분석하고 있어요 💕<br>어떤 사람인지 알아보는 중...</div>
      </div>`;
    document.getElementById('resultModal').classList.add('open');

    const listText = Object.entries(data).map(([cat, items]) => {
      if (!items.length) return null;
      return `[${CAT_LABELS[cat]}]\n` + items.map(i => `- ${i.title}${i.desc?': '+i.desc:''}`).join('\n');
    }).filter(Boolean).join('\n\n');

    const prompt = `다음은 사용자의 이상형 리스트입니다:\n\n${listText}\n\n이를 바탕으로 아래 JSON만 반환해주세요. 마크다운 없이 순수 JSON만 출력하세요.\n\n{"personality_summary":"이 이상형이 어떤 사람인지 2~3문장으로 따뜻하고 재밌게 요약. 별명을 붙여줘도 좋아요 (예: 햇살 같은 현실주의자)","keyword_tags":["핵심 키워드 3~5개"],"where_to_meet":[{"place":"장소명","reason":"이 장소에서 만날 수 있는 이유 한 줄"},{"place":"장소명","reason":"..."},{"place":"장소명","reason":"..."},{"place":"장소명","reason":"..."},{"place":"장소명","reason":"..."}],"love_tip":"이런 이상형을 만나기 위한 현실적이고 재미있는 팁 한 줄"}`;

    try {
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }]
        })
      });
      const json = await resp.json();
      const raw = json.content?.[0]?.text || '';
      const result = JSON.parse(raw.replace(/```json|```/g,'').trim());
      renderResult(result);
    } catch(e) {
      document.getElementById('resultContent').innerHTML = `
        <div class="result-section">
          <div class="result-text">분석 중 오류가 발생했어요 😅<br>잠시 후 다시 시도해주세요.</div>
        </div>`;
    } finally {
      btn.disabled = false;
      btn.innerHTML = '✨ 내 이상형 AI 분석하기';
    }
  }

  function renderResult(r) {
    const tagsHTML = (r.keyword_tags||[]).map(t => `<span class="place-tag">${t}</span>`).join('');
    const placesHTML = (r.where_to_meet||[]).map(p => `
      <div class="item-card" style="margin-bottom:8px">
        <div class="item-icon">📍</div>
        <div class="item-body">
          <div class="item-title">${p.place}</div>
          <div class="item-desc">${p.reason}</div>
        </div>
      </div>`).join('');

    document.getElementById('resultContent').innerHTML = `
      <div class="result-section">
        <div class="result-section-title">💕 이상형 한 줄 요약</div>
        <div class="result-text">${r.personality_summary||''}</div>
      </div>
      <div class="result-section">
        <div class="result-section-title">🏷️ 키워드</div>
        <div class="place-tags">${tagsHTML}</div>
      </div>
      <div class="result-section">
        <div class="result-section-title">📍 어디서 만날 수 있을까?</div>
        ${placesHTML}
      </div>
      <div class="result-section" style="background:#FFF0EB; border:1.5px solid #F4A261;">
        <div class="result-section-title" style="color:#F4A261;">💡 러브 팁</div>
        <div class="result-text">${r.love_tip||''}</div>
      </div>`;
  }

  function openShareModal() { document.getElementById('shareModal').classList.add('open'); }
  function shareLink() {
    navigator.clipboard.writeText(window.location.href)
      .then(() => { closeModal('shareModal'); showToast('링크가 복사됐어요 🔗'); })
      .catch(() => showToast('복사 실패 😅'));
  }
  function shareImage() { closeModal('shareModal'); showToast('화면을 캡처해서 공유해보세요 📸'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }
  function closeModalOnOverlay(e, id) { if (e.target === document.getElementById(id)) closeModal(id); }
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  renderAll();
</script>
</body>
</html>
